services:
  postgres:
    image: postgres:17
    container_name: padel-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: padel
      POSTGRES_USER: padel
      POSTGRES_PASSWORD: padel
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db:/workspace/db
      - ./data:/workspace/data
      - ./db/init:/docker-entrypoint-initdb.d

  adminer:
    image: adminer:4
    container_name: padel-adminer
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: postgres

volumes:
  postgres_data:
